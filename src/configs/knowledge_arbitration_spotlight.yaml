experiments:
  - name: arbitration_spotlight_t12_matrix
    priority: highest
    benchmarks:
      - conflictbank
      - popqa
      - nq_swap
      - memotrap
      - faitheval
    models:
      - meta-llama/Llama-3.1-8B-Instruct
      - meta-llama/Llama-3.1-70B-Instruct
      - Qwen/Qwen2.5-7B-Instruct
      - Qwen/Qwen2.5-14B-Instruct
      - deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    conditions:
      - closed_book
      - aligned_context
      - conflict_context
      - irrelevant_noise
    cot_lengths: [0, 128, 512, 2048]
    self_consistency: [1, 8]
    baseline_methods:
      - bayes_proxy
      - heuristic_adaptive
      - always_context
      - always_parametric
      - fixed_50
      - simulated_model
      - cad
      - adacad
      - cocoa
      - self_rag
      - crag
      - astute_rag
    max_examples: 512
    notes: "Primary theorem-1/theorem-2 spotlight matrix."

  - name: arbitration_spotlight_t3_size_scaling
    priority: highest
    benchmarks:
      - conflictbank
      - wikicontradict
      - faitheval
      - ambigdocs
      - ramdocs
    models:
      - Qwen/Qwen2.5-7B-Instruct
      - Qwen/Qwen2.5-14B-Instruct
      - Qwen/Qwen2.5-32B-Instruct
      - deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
      - meta-llama/Llama-3.1-8B-Instruct
    conditions:
      - closed_book
      - aligned_context
      - conflict_context
    cot_lengths: [0, 128, 1024]
    self_consistency: [1]
    baseline_methods:
      - simulated_model
      - cad
      - adacad
      - cocoa
    max_examples: 256
    notes: "Primary theorem-3 size-scaling verification matrix."

  - name: arbitration_spotlight_t3_eta_ablation
    priority: highest
    benchmarks:
      - conflictbank
      - wikicontradict
      - faitheval
    models:
      - Qwen/Qwen2.5-14B-Instruct
      - Qwen/Qwen2.5-32B-Instruct
      - deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    conditions:
      - closed_book
      - conflict_context
    cot_lengths: [0, 128, 1024]
    self_consistency: [1]
    ablations:
      - eta_tempering
      - conflict_density
      - retrieval_quality
      - component_drop
    grid:
      eta_value: [0.25, 0.5, 0.75, 1.0]
    max_examples: 256
    notes: "SafeBayes-style eta sweep and decoding intervention scaffold."

  - name: arbitration_spotlight_api_headline_subset
    priority: medium
    benchmarks:
      - conflictbank
      - popqa
      - faitheval
    models:
      - openai/gpt-4o-mini
      - anthropic/claude-3.5-haiku
    conditions:
      - closed_book
      - conflict_context
    cot_lengths: [0, 128, 1024]
    self_consistency: [1]
    baseline_methods:
      - bayes_proxy
      - heuristic_adaptive
      - cad
      - adacad
      - cocoa
    max_examples: 256
    notes: "Closed/API comparator slice for headline tables if budget allows."
