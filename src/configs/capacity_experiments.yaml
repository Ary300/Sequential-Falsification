experiments:
  - name: capacity_pilot_code_primary
    benchmarks: ["humaneval_plus", "mbpp_plus"]
    verifiers: ["majority", "public_test", "sce_trace"]
    model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
    backend: "openai"
    n_candidates: 16
    temperature: 0.7
